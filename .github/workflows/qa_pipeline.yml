name: Enterprise QA Pipeline

# 1. THE TRIGGER: When does this run?
# This tells the robot to wake up every time code is pushed to the 'main' branch.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. THE ENVIRONMENT: What computer are we renting?
jobs:
  test-suite:
    runs-on: ubuntu-latest # We are renting a fresh Linux server from GitHub

    steps:
    # Step A: Download our repository code onto the Linux server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step B: Install Python on the server
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step C: Install all our testing tools (Playwright, Locust, Robot Framework)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install robotframework-requests

    # Step D: Download the browser binaries and initialize Robot Framework Browser
    - name: Install Playwright & RF Browser Dependencies
      run: |
        pip install playwright
        playwright install --with-deps chromium
        rfbrowser init

    # Step E.1: Fix Linux permissions so the ZAP Docker container can save files
    - name: Grant ZAP Permission to Workspace
      run: chmod -R 777 ${{ github.workspace }}

    # Step E.2: Run OWASP ZAP Dynamic Security Scan
    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      continue-on-error: true
      with:
        target: 'https://juice-shop-104226998836.us-central1.run.app'
        fail_action: false

    # Step E.3: Upload the ZAP HTML report so we can download it
    - name: Upload ZAP Security Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zap-security-report
        path: report_html.html

    # Step F: Run the UI Tests with a virtual monitor
    - name: Run Playwright UI Tests
      run: xvfb-run robot -d results e2e_ui_tests/

    # Step G: Run the Headless Performance Test (Scaled down for pipeline execution)
    - name: Run Locust Performance Test
      run: locust -f performance_tests/locustfile_ddt.py --headless -u 50 -r 10 -H https://juice-shop-104226998836.us-central1.run.app -t 15s --html results/locust_report.html

    # Step H: Save the test results so we can download them from GitHub later
    - name: Upload Test Artifacts
      uses: actions/upload-artifact@v4
      if: always() # This ensures reports are uploaded even if a test fails!
      with:
        name: qa-test-reports
        path: results/
        retention-days: 7